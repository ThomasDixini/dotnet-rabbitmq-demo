services:
  rabbitmq:
    image: "rabbitmq:4-management"
    container_name: "rabbitmq"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RabbitMQ__HostName: "rabbitmq"   
      RabbitMQ__Port: "5672"           
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: "demo-api"
    build:
      context: .
      dockerfile: Docker/DemoApi.Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      RabbitMQ__HostName: "rabbitmq"   
      RabbitMQ__Port: "5672"           
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    container_name: "demo-consumer"
    build:
      context: .
      dockerfile: Docker/DemoConsumer.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      RabbitMQ__HostName: "rabbitmq"   
      RabbitMQ__Port: "5672"           
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      rabbitmq:
        condition: service_healthy
    